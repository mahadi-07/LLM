model_list:
  - model_name: local-gemma
    litellm_params:
      model: unsloth/gemma-4-E4B-it-GGUF:Q8_0
      api_base: http://localhost:8080/v1
      api_key: dummy
      custom_llm_provider: openai
      input_cost_per_token: 0.0001
      output_cost_per_token: 0.0002

  - model_name: glm-5.1
    litellm_params:
      model: zai/glm-5.1
      api_base: https://api.z.ai/api/coding/paas/v4
      api_key: os.environ/ZAI_API_KEY
      input_cost_per_token: 0.0005
      output_cost_per_token: 0.0005
      supports_function_calling: true

general_settings:
  master_key: sk-my-super-secret-key
  
  database_url: postgresql://postgres:postgres@localhost:5432/litellm

  store_model_in_db: true
  store_prompts_in_spend_logs: true
  
  store_all_api_requests: true 

  pass_through_all_models: true
  function_calling: true
  mcp_enabled: true
  drop_params: false

  allow_mcp_tools: true


litellm_settings:
  max_internal_user_budget: 0
  internal_user_budget_duration: "1mo" # reset every month
  # enable_mcp: true
  # experimental_features:
  #   mcp_openapi: true



mcp_servers:
  utility_server:
    url: http://localhost:8000/mcp
    model_groups:
      - local-gemma
      - glm-5.1