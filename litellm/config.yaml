model_list:
  - model_name: local
    litellm_params:
      model: unsloth/gemma-4-E4B-it-GGUF:Q8_0
      api_base: http://localhost:8080/v1
      api_key: dummy
      custom_llm_provider: openai
      input_cost_per_token: 0.0001
      output_cost_per_token: 0.0002

  - model_name: local
    litellm_params:
      model: llama3.1:8b
      api_base: http://localhost:11434
      api_key: dummy
      custom_llm_provider: ollama
      input_cost_per_token: 0.00004
      output_cost_per_token: 0.00006
  
  - model_name: glm-5.1
    litellm_params:
      model: zai/glm-5.1
      api_base: https://api.z.ai/api/coding/paas/v4
      api_key: os.environ/ZAI_API_KEY
      input_cost_per_token: 0.0005
      output_cost_per_token: 0.0005
      supports_function_calling: true

  # Gemini Model List
  - model_name: gemma-4-31b-it
    litellm_params:
      model: gemini/gemma-4-31b-it
      api_key: os.environ/GEMINI_API_KEY

  # Groq Model List
  - model_name: groq-chat
    litellm_params:
      model: groq/qwen/qwen3-32b
      api_key: os.environ/GROQ_API_KEY

  - model_name: groq-chat
    litellm_params:
      model: groq/llama-3.3-70b-versatile
      api_key: os.environ/GROQ_API_KEY

  - model_name: groq-guard
    litellm_params:
      model: groq/meta-llama/llama-prompt-guard-2-86m
      api_key: os.environ/GROQ_API_KEY

  # - model_name: groq-whisper
  #   litellm_params:
  #     model: groq/whisper-large-v3
  #     api_key: os.environ/GROQ_API_KEY
  #     drop_params: ["max_tokens"]

router_settings:
  routing_strategy: simple-shuffle
